<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fixtura — Test Data Studio</title>
  <link rel="icon" href="/favicon.ico?v=15" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=15" />
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png?v=15" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=15" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=15" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=15" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css?v=15" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="brand">
        <div class="logo">{}</div>
        <div>
          <div class="brand-name">Fixtura</div>
          <div class="brand-sub">TEST DATA STUDIO</div>
        </div>
      </div>
      <div class="divider"></div>
      <label><span class="hint">Table</span>
        <input id="tableName" value="users" spellcheck="false" style="width:150px" />
      </label>
      <div class="spacer"></div>
      <label><span class="hint">Seed</span>
        <input id="seed" type="number" value="42" style="width:78px" />
      </label>
      <!-- Appearance settings live in a popover so the header stays uncluttered. -->
      <div class="settings-wrap">
        <button id="settingsBtn" class="btn btn-ghost-light settings-btn" type="button"
                title="Appearance" aria-haspopup="true" aria-expanded="false">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
          <span class="settings-label">Appearance</span>
        </button>
        <div class="settings-menu" id="settingsMenu" role="menu" aria-label="Appearance" hidden>
          <div class="settings-heading">Appearance</div>
          <label class="settings-row"><span>Theme</span>
            <select id="theme">
              <option value="Federal Blue">Federal Blue</option>
              <option value="Slate">Slate</option>
              <option value="Teal">Teal</option>
              <option value="Ink">Ink</option>
              <option value="Custom">Custom…</option>
            </select>
          </label>
          <label class="settings-row" id="customColorRow" style="display:none"><span>Accent</span>
            <input id="customColor" type="color" value="#005ea2" title="Custom accent colour" />
          </label>
          <label class="settings-row"><span>Density</span>
            <select id="density" title="Row spacing: roomy to dense">
              <option value="comfortable">Comfortable</option>
              <option value="cozy">Cozy</option>
              <option value="compact">Compact</option>
            </select>
          </label>
        </div>
      </div>
      <button id="savePreset" class="btn btn-ghost"
              title="Save the current setup as a reusable template">Save</button>
      <button id="generate" class="btn btn-primary">
        <svg class="gen-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="3" /><circle
             cx="8.5" cy="8.5" r="1.4" fill="currentColor" /><circle cx="15.5" cy="8.5" r="1.4"
             fill="currentColor" /><circle cx="8.5" cy="15.5" r="1.4" fill="currentColor" /><circle
             cx="15.5" cy="15.5" r="1.4" fill="currentColor" /><circle cx="12" cy="12" r="1.4"
             fill="currentColor" /></svg>Generate</button>
    </header>

    <!-- Main: left input, right output -->
    <main class="main">

      <section class="left">
        <div class="section-label">DEFINE SCHEMA</div>
        <div class="tabbar" id="inputTabs"></div>
        <div class="scroll" id="inputPanel"></div>
      </section>

      <section class="right">
        <div class="output-bar">
          <div class="tabbar" id="outputTabs"></div>
          <div class="spacer"></div>
          <div class="rows-ctrl" id="rowsCtrl">
            <span class="lbl" id="rowsLbl">Rows</span>
            <select id="rowSelect" title="Common row counts">
              <option value="10">10</option>
              <option value="100">100</option>
              <option value="1000">1,000</option>
              <option value="10000">10,000</option>
            </select>
            <span class="lbl">or</span>
            <input id="rowCount" value="25" placeholder="custom"
                   title="Type any number of rows" />
          </div>
          <div class="pdf-ctrl" id="pdfCtrl" style="display:none"
               title="PDF style: one big table, or one page per row">
            <button class="pdf-mode active" data-pdfmode="table">Table</button>
            <button class="pdf-mode" data-pdfmode="docs">Doc</button>
          </div>
          <div class="divider" style="background:#e2e6ec;height:24px"></div>
          <button id="shareBtn" class="btn btn-ghost"
                  title="Share this setup as a link (the recipe, not the data)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
                 style="margin-right:5px;vertical-align:-2px">
              <path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7" /><path d="M16 6l-4-4-4 4" />
              <path d="M12 2v13" /></svg>Share</button>
          <button id="copy" class="btn btn-ghost">Copy</button>
          <button id="download" class="btn btn-primary">Export</button>
        </div>
        <div class="output-body" id="outputBody"></div>
        <div class="footer">
          <span><span class="dot"></span><span id="statRows">0 rows</span></span>
          <span class="sep">·</span>
          <span class="mono">seed <span id="statSeed">42</span></span>
          <span class="mono" id="statMs"></span>
          <span id="statNote"></span>
        </div>
      </section>

    </main>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Save-as-template modal. Hidden until the Save button opens it. -->
  <div class="modal-overlay" id="saveModal" hidden>
    <div class="modal">
      <div class="modal-title" id="saveModalTitle">Save template</div>
      <div class="modal-sub" id="saveModalSub"></div>
      <input id="saveModalName" class="modal-input" maxlength="32"
             placeholder="Name this template" spellcheck="false" />
      <div class="modal-err" id="saveModalErr" hidden></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="saveModalCancel">Cancel</button>
        <button class="btn btn-primary" id="saveModalReplace" hidden>Replace</button>
        <button class="btn btn-primary" id="saveModalOk">Save</button>
      </div>
    </div>
  </div>

  <!-- Share-link modal. Opened by the Share button; shows a copyable link that
       encodes the whole setup in the URL fragment. -->
  <div class="modal-overlay" id="shareModal" hidden>
    <div class="modal">
      <div class="modal-title">Share this setup</div>
      <div class="modal-sub" id="shareModalSub"></div>
      <input id="shareModalLink" class="modal-input" readonly spellcheck="false" />
      <div class="modal-actions">
        <button class="btn btn-ghost" id="shareModalCancel">Close</button>
        <button class="btn btn-primary" id="shareModalCopy">Copy link</button>
      </div>
    </div>
  </div>

  <!-- Delete-confirmation dialog. Opened by the ✕ on a saved card. -->
  <div class="modal-overlay" id="confirmModal" hidden>
    <div class="modal">
      <div class="modal-icon modal-icon-danger">🗑</div>
      <div class="modal-title">Delete this template?</div>
      <div class="modal-sub" id="confirmModalSub"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="confirmCancel">Cancel</button>
        <button class="btn btn-danger" id="confirmOk">Delete</button>
      </div>
    </div>
  </div>

  <script src="/app.js?v=15"></script>
</body>
</html>
