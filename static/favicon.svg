<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Fixtura">
  <!-- Mirrors the in-app logo: white {} mark on a rounded Federal-Blue square.
       Fixed accent (favicons can't follow the runtime theme picker). -->
  <rect width="32" height="32" rx="7.5" fill="#005ea2"/>
  <text x="16" y="15" fill="#ffffff" text-anchor="middle" dominant-baseline="central"
        font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace"
        font-weight="600" font-size="17" letter-spacing="-1">{}</text>
</svg>
